# Canonical archive-update workflow (sustainable-fsa S3 migration).
name: update
run-name: Update the fsa-normal-grazing-period archive → S3

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['**.R', '**.qmd', '.github/workflows/**']

permissions:
  id-token: write
  contents: write  # commit-back of rendered README and dashboard

concurrency:
  group: s3-archive-${{ github.repository }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash -l {0}

jobs:
  update:
    runs-on: macos-latest
    timeout-minutes: 350
    env:
      S3_BUCKET: sustainable-fsa
      S3_PREFIX: fsa-normal-grazing-period
      AWS_REGION: us-west-2
      CLOUDFRONT_DISTRIBUTION_ID: E1BNL6ONVN84RI
      CLOUDFRONT_BASE: https://data.sustainable-fsa.com
    steps:
      - uses: mt-climate-office/actions/setup-geospatial@v1
        with:
          extra-r-packages: quarto readxl

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Configure AWS credentials (GitHub OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::202533506375:role/sustainable-fsa-github-actions
          aws-region: us-west-2
          role-duration-seconds: 14400

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Update archive
        run: Rscript fsa-normal-grazing-period.R

      # Commit the freshly rendered README and dashboard back to git;
      # GitHub Pages serves the dashboard from this repo. Gated on the
      # dashboard HTML diff — no-op runs skip the commit.
      - name: Commit refreshed README and dashboard
        run: |
          if git diff --quiet -- fsa-normal-grazing-period.html; then
            echo "Dashboard unchanged; skipping commit."
            exit 0
          fi
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md example-1.png fsa-normal-grazing-period.html fsa-normal-grazing-period_files
          git commit -m 'Update Archive'
          if ! git pull --rebase --autostash origin main; then
            git rebase --abort || true
            echo "::notice::Render superseded by a concurrent run; skipping commit."
            exit 0
          fi
          git push
